name: Auto Comment on Issues

on:
  issues:
    types: [opened, labeled]

jobs:
  auto-comment:
    runs-on: ubuntu-latest
    steps:
      - name: Comment on Issue based on Label
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const labels = issue.labels.map(label => label.name.toLowerCase());
            const owner = context.repo.owner;
            
            let commentBody = null;
            
            if (labels.includes('bug')) {
              commentBody = `Thank you. We will fix it. Best regards, ${owner}.`;
            } else if (labels.includes('feature')) {
              commentBody = `Thank you, we will consider to include this feature. Best regards, ${owner}.`;
            } else if (labels.includes('discussion')) {
              commentBody = `Happy to discuss this topic with you. Best regards, ${owner}.`;
            }
            
            if (commentBody) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: commentBody
              });
              console.log(`Added comment: ${commentBody}`);
            } else {
              console.log('No matching labels found. No comment added.');
            }